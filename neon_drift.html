<!DOCTYPE html>
<html>
<head>
    <title>NEON DRIFT // VECTOR</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { 
    display: block;
    touch-action: none;
}
        #overlay {
            position: absolute; top: 20px; left: 20px; color: #0ff;
            text-shadow: 0 0 10px #0ff; pointer-events: none;
        }
        .label { font-size: 12px; opacity: 0.7; }
        .value { font-size: 24px; margin-bottom: 10px; }
        #death-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #fff; display: none; background: rgba(0,0,0,0.8);
            padding: 40px; border: 1px solid #0ff; box-shadow: 0 0 20px #0ff;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="label">NEURAL LINK STATUS: ACTIVE</div>
        <div class="label">SCORE</div>
        <div id="score" class="value">000000</div>
        <div class="label">ENERGY CORE</div>
        <div id="charge-bar" style="width: 150px; height: 10px; border: 1px solid #0ff;">
            <div id="charge-fill" style="width: 0%; height: 100%; background: #0ff;"></div>
        </div>
    </div>

    <div id="death-screen">
        <h1 style="color: #f0f;">CORE RUPTURED</h1>
        <p id="final-score"></p>
        <button onclick="location.reload()" style="background:none; border: 1px solid #0ff; color:#0ff; padding:10px 20px; cursor:pointer;">RE-INITIALIZE</button>
    </div>

    <canvas id="ctx"></canvas>

<script>
const canvas = document.getElementById('ctx');
const g = canvas.getContext('2d');
let w, h;
const setSize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
window.onresize = setSize;
setSize();

const state = {
    score: 0,
    charge: 0,
    gameOver: false,
    particles: [],
    enemies: [],
    bullets: [],
    keys: {}
};

// TOUCH CONTROL STATE
state.touch = {
    left:false,
    right:false,
    thrust:false
};

class Player {
    constructor() {
        this.x = w/2; this.y = h/2;
        this.vX = 0; this.vY = 0;
        this.angle = 0;
        this.accel = 0.15;
        this.friction = 0.98;
        this.radius = 12;
    }

    update() {
        if(state.keys['ArrowLeft'] || state.keys['KeyA'] || state.touch.left) this.angle -= 0.08;
        if(state.keys['ArrowRight'] || state.keys['KeyD'] || state.touch.right) this.angle += 0.08;
        
        if(state.keys['ArrowUp'] || state.keys['KeyW'] || state.touch.thrust) {
            this.vX += Math.cos(this.angle) * this.accel;
            this.vY += Math.sin(this.angle) * this.accel;
            // Thruster particles
            if(Math.random() > 0.5) spawnParticle(this.x, this.y, this.angle + Math.PI, '#f0f', 2);
        }

        this.x += this.vX; this.y += this.vY;
        this.vX *= this.friction; this.vY *= this.friction;

        // Wrap around screen
        if(this.x < 0) this.x = w; if(this.x > w) this.x = 0;
        if(this.y < 0) this.y = h; if(this.y > h) this.y = 0;

        if(state.keys['Space'] && state.charge >= 100) this.supernova();
    }

    draw() {
        g.save();
        g.translate(this.x, this.y);
        g.rotate(this.angle);
        g.strokeStyle = '#0ff';
        g.lineWidth = 2;
        g.shadowBlur = 10; g.shadowColor = '#0ff';
        g.beginPath();
        g.moveTo(15, 0); g.lineTo(-10, -10); g.lineTo(-5, 0); g.lineTo(-10, 10);
        g.closePath();
        g.stroke();
        g.restore();
    }

    supernova() {
        state.charge = 0;
        for(let i=0; i<80; i++) spawnParticle(this.x, this.y, Math.random()*Math.PI*2, '#fff', 10);
        state.enemies.forEach(e => {
            const dist = Math.hypot(e.x - this.x, e.y - this.y);
            if(dist < 300) e.dead = true;
        });
    }
}

class Enemy {
    constructor() {
        this.x = Math.random() > 0.5 ? 0 : w;
        this.y = Math.random() * h;
        this.speed = 1 + Math.random() * 2;
        this.angle = Math.random() * Math.PI * 2;
        this.radius = 10;
        this.color = `hsl(${Math.random()*60 + 300}, 100%, 50%)`;
    }
    update(px, py) {
        const angleToPlayer = Math.atan2(py - this.y, px - this.x);
        this.angle += (angleToPlayer - this.angle) * 0.02;
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
    }
    draw() {
        g.strokeStyle = this.color;
        g.shadowBlur = 8; g.shadowColor = this.color;
        g.strokeRect(this.x-8, this.y-8, 16, 16);
    }
}

function spawnParticle(x, y, angle, color, force) {
    state.particles.push({
        x, y, 
        vX: Math.cos(angle) * (Math.random() * force),
        vY: Math.sin(angle) * (Math.random() * force),
        life: 1.0,
        color
    });
}

const player = new Player();
window.onkeydown = e => state.keys[e.code] = true;
window.onkeyup = e => state.keys[e.code] = false;

// TOUCH CONTROLS
canvas.addEventListener("touchstart", handleTouch);
canvas.addEventListener("touchmove", handleTouch);
canvas.addEventListener("touchend", stopTouch);

function handleTouch(e){
    e.preventDefault();

    const touch = e.touches[0];
    const x = touch.clientX;
    const y = touch.clientY;

    state.touch.left = false;
    state.touch.right = false;
    state.touch.thrust = false;

    if(x < w/2) state.touch.left = true;
    else state.touch.right = true;

    if(y < h/2) state.touch.thrust = true;

    // two finger supernova
    if(e.touches.length > 1 && state.charge >= 100){
        player.supernova();
    }
}

function stopTouch(){
    state.touch.left = false;
    state.touch.right = false;
    state.touch.thrust = false;
}

function loop() {
    if(state.gameOver) return;
    
    // Background Grid
    g.fillStyle = '#000';
    g.fillRect(0, 0, w, h);
    g.strokeStyle = '#111';
    for(let i=0; i<w; i+=50) { g.beginPath(); g.moveTo(i,0); g.lineTo(i,h); g.stroke(); }
    for(let i=0; i<h; i+=50) { g.beginPath(); g.moveTo(0,i); g.lineTo(w,i); g.stroke(); }

    player.update();
    player.draw();

    // Enemy logic
    if(Math.random() < 0.03) state.enemies.push(new Enemy());
    
    state.enemies.forEach((e, i) => {
        e.update(player.x, player.y);
        e.draw();
        
        // Collision with player
        if(Math.hypot(e.x - player.x, e.y - player.y) < player.radius + e.radius) {
            state.gameOver = true;
            document.getElementById('death-screen').style.display = 'block';
            document.getElementById('final-score').innerText = "SCORE: " + state.score;
        }

        if(e.dead) {
            state.score += 500;
            for(let j=0; j<10; j++) spawnParticle(e.x, e.y, Math.random()*Math.PI*2, e.color, 5);
            state.enemies.splice(i, 1);
        }
    });

    // Bullet Logic (Automatic fire based on charge)
    if(state.charge < 100) state.charge += 0.2;
    document.getElementById('charge-fill').style.width = state.charge + '%';
    document.getElementById('score').innerText = state.score.toString().padStart(6, '0');

    // Particles
    state.particles.forEach((p, i) => {
        p.x += p.vX; p.y += p.vY;
        p.life -= 0.02;
        if(p.life <= 0) state.particles.splice(i, 1);
        g.globalAlpha = p.life;
        g.fillStyle = p.color;
        g.fillRect(p.x, p.y, 2, 2);
    });
    g.globalAlpha = 1;

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
